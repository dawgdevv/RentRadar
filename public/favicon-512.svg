<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0f2a4a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C6FFF"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Radar rings -->
  <circle cx="256" cy="290" r="176" fill="none" stroke="#7C6FFF" stroke-width="10" opacity="0.2"/>
  <circle cx="256" cy="290" r="120" fill="none" stroke="#7C6FFF" stroke-width="10" opacity="0.35"/>
  <circle cx="256" cy="290" r="64" fill="none" stroke="#7C6FFF" stroke-width="10" opacity="0.5"/>

  <!-- House body -->
  <rect x="160" y="288" width="192" height="150" rx="14" fill="url(#bodyGrad)" stroke="#7C6FFF" stroke-width="9"/>

  <!-- Roof -->
  <polygon points="136,298 256,148 376,298" fill="url(#roofGrad)"/>

  <!-- Door -->
  <rect x="224" y="355" width="64" height="83" rx="12" fill="#7C6FFF" opacity="0.85"/>

  <!-- Radar dot -->
  <circle cx="256" cy="290" r="22" fill="#a78bfa"/>
  <circle cx="256" cy="290" r="11" fill="#fff"/>
</svg>
