<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0f2a4a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C6FFF"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Radar rings (behind house) -->
  <circle cx="16" cy="18" r="11" fill="none" stroke="#7C6FFF" stroke-width="0.7" opacity="0.25"/>
  <circle cx="16" cy="18" r="7.5" fill="none" stroke="#7C6FFF" stroke-width="0.7" opacity="0.4"/>
  <circle cx="16" cy="18" r="4" fill="none" stroke="#7C6FFF" stroke-width="0.7" opacity="0.55"/>

  <!-- House body -->
  <rect x="10" y="18" width="12" height="9" rx="1" fill="url(#bodyGrad)" stroke="#7C6FFF" stroke-width="0.6" opacity="1"/>

  <!-- Roof -->
  <polygon points="8.5,18.5 16,9.5 23.5,18.5" fill="url(#roofGrad)"/>

  <!-- Door -->
  <rect x="14" y="22" width="4" height="5" rx="0.8" fill="#7C6FFF" opacity="0.85"/>

  <!-- Radar dot / signal pulse (center of house = origin) -->
  <circle cx="16" cy="18" r="1.4" fill="#a78bfa"/>
  <circle cx="16" cy="18" r="0.7" fill="#fff"/>
</svg>
